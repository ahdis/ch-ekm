# Package name
# https://confluence.hl7.org/display/FHIR/NPM+Package+Specification#NPMPackageSpecification-Packagename
id: ch.fhir.ig.ch-ekm
canonical: http://fhir.ch/ig/ch-ekm
name: CH_EKM
title: "CH EKM (R4)"
description: FHIR® Implementation Guide for the Electronic Clinical Report (Elektronische klinische Meldung) of the Swiss Federal Office of Public Health
status: draft # draft | active | retired | unknown
license: CC0-1.0
copyright: CC0-1.0
jurisdiction: urn:iso:std:iso:3166#CH
date: 2026-01-27
version: 0.0.1 
fhirVersion: 4.0.1
copyrightYear: 2026+
releaseLabel: ci-build  # ci-build # ci-build | draft | qa-preview | ballot | trial-use | release | update | normative+trial-use
publisher:
  name: Federal Office of Public Health FOPH
contact:
  - name: Federal Office of Public Health FOPH
    telecom:
      - system: url
        value: https://www.bag.admin.ch/bag/en/home/das-bag/kontakt-standort.html

dependencies:
 ch.fhir.ig.ch-term: 3.4.x
 ch.fhir.ig.ch-core: 7.0.0-ballot
 hl7.fhir.uv.sdc: 4.0.0


# Predefined resources from input/resources (not generated by SUSHI from FSH).
resources:
  Questionnaire/ChEkmQuestionnaireGonorrhoeaAssembled:
    name: "CH EKM Questionnaire: Gonorrhoea (assembled)"
    description: "Assembled (flattened) Gonorrhoea questionnaire, generated from the modular questionnaire ChEkmQuestionnaireGonorrhoea via Questionnaire/$assemble (tests/assemble-gonorrhoea.sh). Do not edit by hand."
    exampleBoolean: false
  Questionnaire/ChEkmQuestionnaireGonorrhoeaPreview-de-CH:
    name: "CH EKM Questionnaire: Gonorrhoea (preview, de-CH)"
    description: "Preview of the assembled Gonorrhoea questionnaire with option labels in German (de-CH). Do not edit by hand."
    exampleBoolean: false
  ValueSet/ChEkmCountryCodes:
    name: "CH EKM ValueSet: Country Codes"
    description: "ValueSet for country codes, used in the CH EKM IG."
    exampleBoolean: false
  Bundle/ChEkmDocumentGonorrhoea-extracted:
    name: "CH EKM Bundle: Gonorrhoea document (extracted)"
    description: "Gonorrhoea document Bundle produced by SDC template-based $extract from a filled QuestionnaireResponse via the ChEkmDocumentGonorrhoeaTemplate (tests/extract-gonorrhoea.sh). Do not edit by hand."
    exampleBoolean: true
  

pages:
  index.md:
    title: Home
  usecase.md:
    title: Use Case
  examples.md:
    title: Examples
  guidance.md:
    title: Guidance
  profiles.md:
    title: Profiles
  terminology.md:
    title: Terminology


menu:
  Table of Contents: toc.html
  Home: index.html
  Use Case: usecase.html
  Examples: examples.html
  Profiles: profiles.html
  Guidance: guidance.html
  Terminology: terminology.html
  Artifacts: artifacts.html

# Parameters
# Core FHIR: http://build.fhir.org/codesystem-guide-parameter-code.html
# FHIR Tools IG: http://build.fhir.org/ig/FHIR/fhir-tools-ig/branches/master/CodeSystem-ig-parameters.html
parameters:
  allow-extensible-warnings: true
  display-warnings: true
  path-resource:
    - input/resources
    - fsh-generated/resources
  no-narrative: 
    - Bundle/*
  special-url:
    - http://fhir.ch/ig/ch-ekm/CodeSystem/ch-ekm-administrative-gender-language-supplement
  pin-canonicals: pin-none  
  excludettl: true
#  apply-version: false
#  default-version: true
  path-expansion-params: '../../expansion-params.json'  # for using SNOMED CT Swiss Extension
  logging:
    - init
    - progress
    - context
    - html
    - tx

instanceOptions:
  # Determines for which types of Instances SUSHI will automatically set meta.profile
  # if InstanceOf references a profile. Options are:
  # - always: Set meta.profile for all Instances of profiles (default)
  # - never: Do not set meta.profile on any Instances
  # - inline-only: Set meta.profile for only Instances of profiles with Usage set to #inline
  # - standalone-only: Set meta.profile for only Instances of profiles where Usage is any value other than #inline
  setMetaProfile: never